{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card glass-card" id="login-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to find your celebrity twin</p>
        </div>

        <form method="post" class="auth-form" id="login-form" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="login-username">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                {{ form.password }}
            </div>

            <div class="form-row">
                <label class="checkbox-label">
                    {{ form.remember_me }}
                    <span class="checkbox-text">Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="login-submit">
                <span class="btn-text">Sign In</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}" class="auth-link">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
